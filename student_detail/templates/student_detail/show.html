<h2>All Students</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
        <th>action</th>
        <th>delete</th>
    </tr>

    {% for i in data %}
    <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.age }}</td>
        <td>{{ i.city }}</td>
        <td>
            <a href="{% url 'update' i.id %}">Update</a> 

        </td>
        <td>
            <a href="{% url 'delete' i.id %}">delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
